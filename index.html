<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Pixel War Blockchain</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Pixel War Blockchain</h1>
    <div id="status">Connexion à Ganache...</div>
    
    <div class="controls">
        <input type="color" id="colorPicker" value="#ff0000">
        <p>Cliquez sur la grille pour poser un pixel !</p>
    </div>

    <canvas id="pixelCanvas" width="500" height="500"></canvas>

    <div id="ownPixelModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>Posséder ce pixel</h2>
            <p>Entrez le montant en ETH que vous souhaitez mettre sur ce pixel :</p>
            <input type="text" id="pixelAmount" placeholder="0.1" />
            <button id="ownPixelButton">Posséder</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
