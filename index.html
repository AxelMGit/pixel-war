<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Pixel War Blockchain</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Pixel War Blockchain</h1>
    <div id="status">Connexion à Ganache...</div>

    <div class="controls">
      <input type="color" id="colorPicker" value="#ff0000" />
      <p>Cliquez sur la grille pour poser un pixel !</p>
    </div>
    <div class="container">
        <div class="rectangle">
            <p><strong>Pixel : </strong>
            x : <span id="xValue">--</span>
            y : <span id="yValue">--</span>
            Propriétaire : <span id="topLockerValue">--</span>
            Montant : <span id="highestAmountLockedValue">--</span> ETH
        </div>
        <canvas id="pixelCanvas" width="500" height="500"></canvas>
    </div>

    <script type="module" src="app.js"></script>
    <script type="module" src = "./src/focus.js"> </script>
</body>
</html>
